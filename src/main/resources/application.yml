spring:
  application:
    name: marketplace-product-parser
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource: # update when postgres is in place
    generate-unique-name: false
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

file-processing:
  input-dir: "data/input-folder"
  processed-dir: "data/processed-folder"
  failed-dir: "data/failed-folder"
  cron: "* */5 * * * *"
  thread-pool-size: 10
  max-export-age-days: 30

